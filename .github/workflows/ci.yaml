name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Go App
      run: go build -o main .

    - name: Run Tests
      run: go test ./...

    - name: Build Docker Image
      run: docker build -t yourusername/go-web-app:v1 .

    - name: Login DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Image
      run: docker push yourusername/go-web-app:v1 